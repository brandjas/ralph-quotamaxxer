name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: cmd/quotamaxxer/go.mod
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run tests
        run: bats test/
